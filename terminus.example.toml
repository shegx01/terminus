[auth]
telegram_user_id = 123456789
slack_user_id = "U01ABCDEF"
# discord_user_id = 123456789012345678  # Your Discord user snowflake (see README)

[telegram]
bot_token = "YOUR_BOT_TOKEN_HERE"

[slack]
bot_token = "xoxb-YOUR-BOT-TOKEN"
app_token = "xapp-YOUR-APP-TOKEN"
channel_id = "C01ABCDEF"

# [discord]
# IMPORTANT: enable the MESSAGE_CONTENT privileged intent for your bot in the
# Discord Developer Portal (https://discord.com/developers/applications ->
# your app -> Bot -> Privileged Gateway Intents).
# bot_token = "YOUR_BOT_TOKEN_HERE"
# guild_id = 123456789012345678    # omit guild_id and channel_id for DM-only mode
# channel_id = 123456789012345678  # if channel_id is set, guild_id must also be set
# edit_throttle_ms is shared with telegram/slack via [streaming]; not configured per-adapter.

[blocklist]
patterns = [
  "rm\\s+-[a-z]*f[a-z]*r[a-z]*\\s+/",
  "sudo\\s+",
  ":\\(\\)\\{\\s*:\\|:\\&\\s*\\};:",
  "mkfs\\.",
  "dd\\s+if=",
]

[commands]
# Trigger character for shell commands and built-ins (default: ":")
# Messages starting with this char + space are parsed as commands.
# Example: with trigger = "!", you'd type "! ls -la" instead of ": ls -la"
trigger = ":"

[streaming]
edit_throttle_ms = 2000
poll_interval_ms = 250
chunk_size = 4000
offline_buffer_max_bytes = 1048576

[power]
# Whether to spawn the power-management subsystem at all.
# Disable (set to false) in CI or headless environments that have
# no caffeinate / systemd-inhibit available. Default: true.
enabled = true

# Hold the idle-sleep assertion while the lid is open and the host is
# on battery power. Default is false to preserve battery life — the
# assertion is held only on AC. Set to true if you want the host to
# stay awake on battery too (it will drain faster).
stayawake_on_battery = false

# Optional override for the persisted-state file location. Defaults to
# `<terminus.toml's directory>/terminus-state.json`. Set this to e.g.
# `~/.local/share/terminus/state.json` for an XDG-style location.
# state_file = "/absolute/or/~-prefixed/path/to/terminus-state.json"

# ---------------------------------------------------------------------------
# Structured Output (--schema)
# ---------------------------------------------------------------------------
# Named JSON schemas for `: harness --schema <name> <prompt>` commands.
# Each schema entry defines a JSON Schema to validate Claude's output and
# (optionally) a webhook endpoint to deliver it to.
#
# Usage: `: harness --schema todos summarize my open tasks as JSON`
#
# [schemas.todos]
# # JSON Schema definition (use a TOML multi-line string for readability).
# schema = '''
# {
#   "type": "object",
#   "required": ["todos"],
#   "properties": {
#     "todos": {
#       "type": "array",
#       "items": {
#         "type": "object",
#         "required": ["title", "done"],
#         "properties": {
#           "title": { "type": "string" },
#           "done":  { "type": "boolean" }
#         }
#       }
#     }
#   }
# }
# '''
#
# # Optional webhook delivery. If set, terminus will POST the structured
# # output to this URL on every successful Claude run, with HMAC-SHA256
# # authentication.
# webhook = "https://your-server.example.com/webhooks/todos"
#
# # Name of the environment variable containing the HMAC signing secret.
# # Required when `webhook` is set.
# # Set the env var before starting terminus:
# #   export TODOS_WEBHOOK_SECRET="your-32-byte-random-secret"
# webhook_secret_env = "TODOS_WEBHOOK_SECRET"

# ---------------------------------------------------------------------------
# WebSocket Bidirectional API
# ---------------------------------------------------------------------------
# Exposes an authenticated WebSocket endpoint for local programs and remote
# agents to drive terminus programmatically. Plain ws:// — deploy behind a
# reverse proxy (nginx/caddy/Traefik) for wss:// TLS termination.
#
# [socket]
# enabled = true
# bind = "127.0.0.1"   # use "0.0.0.0" for container deployments
# port = 7645
# max_connections = 16
# max_subscriptions_per_connection = 8
# max_pending_requests = 32
# rate_limit_per_second = 20.0
# rate_limit_burst = 60.0
# max_message_bytes = 1048576      # 1 MiB
# ping_interval_secs = 30
# pong_timeout_secs = 10
# idle_timeout_secs = 300
# send_buffer_size = 1024
# shutdown_drain_secs = 30
#
# # Per-client named tokens. Each client authenticates with
# # Authorization: Bearer <token> at the HTTP upgrade.
# [[socket.client]]
# name = "agent-a"
# token = "tk_live_your-32-byte-random-secret-here"
#
# [[socket.client]]
# name = "dashboard"
# token = "tk_live_another-secret-for-the-dashboard"

# [structured_output]
# # HTTP timeout for webhook delivery attempts (milliseconds). Default: 5000.
# timeout_ms = 5000
#
# # Directory for the write-ahead delivery queue.
# # Defaults to the platform data directory:
# #   macOS: ~/Library/Application Support/terminus/queue
# #   Linux: ~/.local/share/terminus/queue
# # queue_dir = "/absolute/path/to/queue"
#
# # Maximum age (in hours) for a queued delivery job. Jobs older than this
# # are moved to the dead/ folder and a warning is broadcast to the chat.
# # Set to 0 (the default) to retry indefinitely.
# max_retry_age_hours = 0
