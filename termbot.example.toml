[auth]
telegram_user_id = 123456789
slack_user_id = "U01ABCDEF"
# discord_user_id = 123456789012345678  # Your Discord user snowflake (see README)

[telegram]
bot_token = "YOUR_BOT_TOKEN_HERE"

[slack]
bot_token = "xoxb-YOUR-BOT-TOKEN"
app_token = "xapp-YOUR-APP-TOKEN"
channel_id = "C01ABCDEF"

# [discord]
# IMPORTANT: enable the MESSAGE_CONTENT privileged intent for your bot in the
# Discord Developer Portal (https://discord.com/developers/applications ->
# your app -> Bot -> Privileged Gateway Intents).
# bot_token = "YOUR_BOT_TOKEN_HERE"
# guild_id = 123456789012345678    # omit guild_id and channel_id for DM-only mode
# channel_id = 123456789012345678  # if channel_id is set, guild_id must also be set
# edit_throttle_ms is shared with telegram/slack via [streaming]; not configured per-adapter.

[blocklist]
patterns = [
  "rm\\s+-[a-z]*f[a-z]*r[a-z]*\\s+/",
  "sudo\\s+",
  ":\\(\\)\\{\\s*:\\|:\\&\\s*\\};:",
  "mkfs\\.",
  "dd\\s+if=",
]

[commands]
# Trigger character for shell commands and built-ins (default: ":")
# Messages starting with this char + space are parsed as commands.
# Example: with trigger = "!", you'd type "! ls -la" instead of ": ls -la"
trigger = ":"

[streaming]
edit_throttle_ms = 2000
poll_interval_ms = 250
chunk_size = 4000
offline_buffer_max_bytes = 1048576

[power]
# Whether to spawn the power-management subsystem at all.
# Disable (set to false) in CI or headless environments that have
# no caffeinate / systemd-inhibit available. Default: true.
enabled = true

# Hold the idle-sleep assertion while the lid is open and the host is
# on battery power. Default is false to preserve battery life — the
# assertion is held only on AC. Set to true if you want the host to
# stay awake on battery too (it will drain faster).
stayawake_on_battery = false

# Optional override for the persisted-state file location. Defaults to
# `<termbot.toml's directory>/termbot-state.json`. Set this to e.g.
# `~/.local/share/termbot/state.json` for an XDG-style location.
# state_file = "/absolute/or/~-prefixed/path/to/termbot-state.json"
